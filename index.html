<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aryan Malhotra</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: rgba(255,255,255,0.07);
      --text-primary: #f0ede8;
      --text-secondary: rgba(240, 237, 232, 0.45);
      --accent: #e8e0d4;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(232,224,212,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3.5rem 3rem;
      max-width: 560px;
      width: calc(100% - 3rem);
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.06);
      opacity: 0;
      transform: translateY(24px);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(232,224,212,0.3), transparent);
      border-radius: 1px;
    }

    .name-block {
      margin-bottom: 1.6rem;
      opacity: 0;
      transform: translateY(14px);
    }

    .hi {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      color: var(--text-secondary);
      font-weight: 400;
      display: block;
      margin-bottom: 0.3rem;
    }

    .name-link {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.1;
      letter-spacing: -0.02em;
      text-decoration: none;
      display: inline-block;
      position: relative;
      transition: color 0.3s ease;
    }

    .name-link::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      transform: scaleX(0);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .name-link:hover { color: var(--accent); }
    .name-link:hover::after { transform: scaleX(1); }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--border);
      margin: 1.8rem auto;
      opacity: 0;
      transform: translateY(14px);
    }

    .message {
      font-size: clamp(0.95rem, 2vw, 1.05rem);
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.8;
      letter-spacing: 0.01em;
      opacity: 0;
      transform: translateY(14px);
    }

    .message .thine {
      color: var(--text-primary);
      font-weight: 400;
    }

    .message .connect {
      color: var(--accent);
      font-style: italic;
      font-family: 'DM Serif Display', serif;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="name-block" id="nameBlock">
      <span class="hi">Hi, I am</span>
      <a class="name-link" href="https://www.linkedin.com/in/aryan-malhotra-profile/" target="_blank" rel="noopener">Aryan Malhotra</a>
    </div>

    <div class="divider" id="divider"></div>

    <p class="message" id="message">
      And if you work at <span class="thine">Thine</span> —<br/>
      I'm waiting for you on LinkedIn.<br/>
      See you there!
    </p>
  </div>

  <script>
    function animate(el, delay, duration = 800) {
      setTimeout(() => {
        el.style.transition = `opacity ${duration}ms ease, transform ${duration}ms cubic-bezier(0.22,1,0.36,1)`;
        el.style.opacity = '1';
        el.style.transform = 'translateY(0)';
      }, delay);
    }

    const card = document.getElementById('card');
    setTimeout(() => {
      card.style.transition = 'opacity 900ms cubic-bezier(0.22,1,0.36,1), transform 900ms cubic-bezier(0.22,1,0.36,1)';
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, 200);

    animate(document.getElementById('nameBlock'), 500);
    animate(document.getElementById('divider'), 700);
    animate(document.getElementById('message'), 900);
  </script>
</body>
</html>
